function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v||''}
function setLang(l,btn){lang=l;document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyAll();buildChips()}
function buildSel(id,opts){const el=document.getElementById(id);if(!el)return;const cv=el.value;el.innerHTML=opts.map((o,i)=>`<option value=&quot;${i===0?'':o}&quot;>${o}</option>`).join('');if(cv)el.value=cv}
function applyAll(){const tx=TX[lang];for(let i=0;i<5;i++){s('ey'+i,tx.ey[i]);s('h'+i,tx.h[i]);s('sb'+i,tx.sub[i])}for(let i=0;i<4;i++){s('oc'+i,tx.oc[i]);s('od'+i,tx.od[i])}const lm={niche:'lniche',prod:'lprod',diff:'ldiff',age:'lage',gen:'lgen',inc:'linc',loc:'lloc',pains:'lpains',desires:'ldesires',obj:'lobj',plat:'lplat',cont:'lcont',trig:'ltrig'};Object.keys(lm).forEach(k=>{const el=document.getElementById('l-'+k);if(el)el.textContent=tx[lm[k]]});buildSel('f-age',tx.age);buildSel('f-gen',tx.gen);buildSel('f-inc',tx.inc);for(let i=1;i<=4;i++){s('n'+i,tx.next);s('bk'+i,tx.back)}s('n0',tx.next);s('genbtn',tx.gen_btn);s('loading-txt',tx.loading);s('res-title',tx.res_title);const cb=document.getElementById('copybtn');if(cb)cb.textContent=tx.copy;const rb=document.getElementById('restartbtn');if(rb)rb.textContent=tx.restart;updPg()}
function buildChips(){const w=document.getElementById('plat-chips');w.innerHTML=PLAT.map(p=>`<button class=&quot;chip${selPlat.includes(p)?' on':''}&quot; onclick=&quot;togglePlat('${p}',this)&quot;>${p}</button>`).join('')}
function togglePlat(p,btn){if(selPlat.includes(p))selPlat=selPlat.filter(x=>x!==p);else selPlat.push(p);btn.classList.toggle('on')}
function pick(k,v,btn){fd[k]=v;btn.closest('.og').querySelectorAll('.oc').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}
function go(n){document.getElementById('s'+cur).classList.remove('on');cur=n;document.getElementById('s'+n).classList.add('on');updPg();window.scrollTo({top:0,behavior:'smooth'})}
function validate(step){
  const tx=TX[lang];
  if(step===0){if(!fd.profile){toast(tx.e0);return}go(1);return}
  if(step===1){const ni=document.getElementById('f-niche').value.trim(),pr=document.getElementById('f-prod').value.trim();if(!ni||!pr){if(!ni)flash('f-niche');if(!pr)flash('f-prod');toast(tx.e1);return}go(2);return}
  if(step===3){const pa=document.getElementById('f-pains').value.trim();if(!pa){flash('f-pains');toast(tx.e3);return}go(4);return}
}
function flash(id){const el=document.getElementById(id);if(!el)return;el.classList.add('field-err');setTimeout(()=>el.classList.remove('field-err'),2500)}
function updPg(){const pct=Math.round((cur/4)*100);document.getElementById('pgfill').style.width=pct+'%';document.getElementById('pgstep').textContent=TX[lang].ey[cur]||'';document.getElementById('pgpct').textContent=pct+'%'}
function nowDate(){return new Date().toLocaleDateString(lang==='pt'?'pt-BR':lang==='es'?'es-ES':'en-US',{day:'2-digit',month:'long',year:'numeric'})}
async function generate(){
  ['niche','prod','diff','loc','cont','trig'].forEach(k=>{fd[k]=document.getElementById('f-'+k)?.value||''});
  ['age','gen','inc'].forEach(k=>{fd[k]=document.getElementById('f-'+k)?.value||''});
  ['pains','desires','obj'].forEach(k=>{fd[k]=document.getElementById('f-'+k)?.value||''});
  fd.plat=selPlat.join(', ');
  const btn=document.getElementById('genbtn');btn.disabled=true;
  document.getElementById('steps').style.display='none';
  document.getElementById('result').classList.add('on');
  document.getElementById('spin-wrap').style.display='flex';
  document.getElementById('doc').style.display='none';
  document.getElementById('res-acts').style.display='none';
  const pm={creator:TX[lang].oc[0],traffic:TX[lang].oc[1],business:TX[lang].oc[2],consulting:TX[lang].oc[3]};
  const msg=`Perfil: ${pm[fd.profile]||'N/A'}\nNicho: ${fd.niche}\nProduto/Serviço: ${fd.prod}\nDiferencial: ${fd.diff||'Não informado'}\nFaixa etária: ${fd.age||'Não informado'}\nGênero: ${fd.gen||'Não informado'}\nRenda: ${fd.inc||'Não informado'}\nLocalização: ${fd.loc||'Não informado'}\nDores: ${fd.pains}\nDesejos: ${fd.desires||'Não informado'}\nObjeções: ${fd.obj||'Não informado'}\nPlataformas: ${fd.plat||'Não informado'}\nConteúdo: ${fd.cont||'Não informado'}\nGatilhos: ${fd.trig||'Não informado'}`;
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,system:TX[lang].sys(nowDate()),messages:[{role:'user',content:msg}]})});
    const d=await r.json();
    const txt=d.content?.map(b=>b.text||'').join('')||'Erro ao gerar.';
    document.getElementById('spin-wrap').style.display='none';
    const doc=document.getElementById('doc');doc.textContent=txt;doc.style.display='block';
    document.getElementById('res-acts').style.display='flex';
  }catch(e){
    document.getElementById('spin-wrap').style.display='none';
    const doc=document.getElementById('doc');doc.textContent='Erro de conexão. Tente novamente.';doc.style.display='block';
    document.getElementById('res-acts').style.display='flex';
    btn.disabled=false;
  }
}
function copyDoc(){navigator.clipboard.writeText(document.getElementById('doc').textContent).then(()=>{const btn=document.getElementById('copybtn');btn.textContent=TX[lang].copied;setTimeout(()=>btn.textContent=TX[lang].copy,2000)})}
function restart(){fd={};selPlat=[];cur=0;document.getElementById('steps').style.display='block';document.getElementById('result').classList.remove('on');document.querySelectorAll('.step').forEach(s=>s.classList.remove('on'));document.getElementById('s0').classList.add('on');document.querySelectorAll('.oc').forEach(b=>b.classList.remove('on'));document.getElementById('genbtn').disabled=false;['f-niche','f-prod','f-diff','f-loc','f-cont','f-trig','f-pains','f-desires','f-obj'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});applyAll();buildChips();window.scrollTo({top:0,behavior:'smooth'})}
applyAll();buildChips();
</script>

.chip{padding:6px 14px;border:1px solid var(--bd);border-radius:99px;font-size:13px;color:var(--tx2);background:var(--surf);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.chip.on{border-color:var(--ac);color:var(--ac);background:var(--ac-d)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--bd)}
.btn{padding:11px 22px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;border:none}
.btn-p{background:var(--ac);color:#06080F;box-shadow:0 0 20px var(--ac-gs);font-weight:600}
.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 28px var(--ac-gs)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:transparent;color:var(--tx2);border:1px solid var(--bd)}
.btn-g:hover{border-color:var(--bd-h);color:var(--tx)}
.res{display:none}.res.on{display:block;animation:fi .3s ease}
.res-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:10px;flex-wrap:wrap}
.res-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.res-btns{display:flex;gap:8px}
.spin-wrap{display:flex;align-items:center;gap:12px;padding:3rem 0}
.spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;box-shadow:0 0 10px var(--ac-g);flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.doc{background:var(--surf);border:1px solid var(--bd);border-radius:14px;padding:1.5rem;font-size:13.5px;line-height:1.9;white-space:pre-wrap;color:var(--tx);display:none}
.res-acts{display:none;gap:10px;margin-top:1rem}
.tool-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--ac-d);border:1px solid rgba(0,212,255,0.16);border-radius:99px;font-size:10.5px;color:var(--ac);font-weight:500;letter-spacing:.06em;margin-bottom:1.5rem}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0a1520;border:1px solid rgba(248,113,113,0.4);border-radius:10px;padding:10px 18px;font-size:13px;color:#f87171;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

function go(n){document.getElementById('s'+cur).classList.remove('on');cur=n;document.getElementById('s'+n).classList.add('on');if(n===2)buildHookTabs();if(n===3)buildFmtTabs();updPg();window.scrollTo({top:0,behavior:'smooth'})}
function validate(step){
  const tx=TX[lang];
  if(step===0){
    if(selMode==='paste'&amp;&amp;!document.getElementById('f-paste').value.trim()){flash('f-paste');toast(tx.e0);return}
    if(selMode==='fields'&amp;&amp;!document.getElementById('f-fniche').value.trim()&amp;&amp;!document.getElementById('f-fpain').value.trim()){toast(tx.e0);return}
    go(1);return;
  }
  if(step===1){if(!document.getElementById('f-topic').value.trim()){flash('f-topic');toast(tx.e1);return}go(2);return}
}

async function generateScript(){
  let persona='';
  if(selMode==='paste'){persona=document.getElementById('f-paste').value||''}
  else{const ni=document.getElementById('f-fniche').value,av=document.getElementById('f-favatar').value,pa=document.getElementById('f-fpain').value,de=document.getElementById('f-fdesire').value;persona=`Nicho: ${ni}\nAvatar: ${av||'Não informado'}\nDor: ${pa}\nDesejo: ${de||'Não informado'}`}
  const topic=document.getElementById('f-topic').value;
  const extra=document.getElementById('f-extra').value;
  // use edited hook if user modified, otherwise original selection
  const hookEdited=document.getElementById('f-hookedit').value.trim();
  const hookFinal=hookEdited||selHook||'(Livre — crie um gancho criativo)';
  const platLabel=TX[lang].pb[selPlat==='reels'?0:1];
  const funnelIdx={top:0,mid:1,bot:2}[selFunnel]??0;
  const funnelLabel=TX[lang].fb[funnelIdx]+' — '+TX[lang].fs[funnelIdx];
  const btn=document.getElementById('genbtn');btn.disabled=true;
  document.getElementById('steps').style.display='none';
  document.getElementById('result').classList.add('on');
  document.getElementById('spin-wrap').style.display='flex';
  document.getElementById('doc').style.display='none';
  document.getElementById('res-acts').style.display='none';
  const msg=`PERSONA:\n${persona}\n\nPLATAFORMA: ${platLabel}\nFUNIL: ${funnelLabel}\nASSUNTO: ${topic}\nGANCHO ESCOLHIDO: ${hookFinal}\nFORMATO: ${selFmt||'Livre'}\nOBSERVAÇÕES: ${extra||'Nenhuma'}`;
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,system:TX[lang].sys(nowDate()),messages:[{role:'user',content:msg}]})});
    const d=await r.json();
    const txt=d.content?.map(b=>b.text||'').join('')||'Erro ao gerar.';
    document.getElementById('spin-wrap').style.display='none';
    const doc=document.getElementById('doc');doc.textContent=txt;doc.style.display='block';
    document.getElementById('res-acts').style.display='flex';
  }catch(e){
    document.getElementById('spin-wrap').style.display='none';
    const doc=document.getElementById('doc');doc.textContent='Erro de conexão. Tente novamente.';doc.style.display='block';
    document.getElementById('res-acts').style.display='flex';
    btn.disabled=false;
  }
}

<body>

</div>
<script>
const API_URL = &quot;https://creatorkit-backend-nnlg.onrender.com/api/chat&quot;;
let lang='pt',cur=0,selObj='',selSlides='7',selTom='',parsedSlides=[];
const TX={

sys(n,date){return`Você é especialista em Instagram Stories. Data: ${date}. Crie uma sequência de ${n} stories em português brasileiro. Retorne APENAS um array JSON válido, sem texto antes ou depois, sem markdown, sem blocos de código. Formato exato:\n[{&quot;num&quot;:1,&quot;label&quot;:&quot;Gancho&quot;,&quot;text&quot;:&quot;texto exato do slide (máx 3 linhas)&quot;,&quot;art&quot;:&quot;instrução visual detalhada: cor de fundo, imagem/vídeo, stickers, layout, emojis&quot;},{&quot;num&quot;:2,...},...]\nRegras:\n- Slide 1: gancho forte que gere curiosidade\n- Último slide: CTA claro e direto\n- Textos curtos, máximo 3 linhas por slide\n- Arte deve ser prática e executável por qualquer criador\n- Linguagem natural, não corporativa\n- Retorne SOMENTE o array JSON, nada mais.`}},
en:{ey:['STEP 1 / 4','STEP 2 / 4','STEP 3 / 4','STEP 4 / 4'],h:['Persona &amp; context','Sequence objective','Quantity &amp; tone','Final details'],sub:['Paste the persona or describe who this sequence is for.','What do you want the follower to feel or do?','How many slides and how do you want to communicate.','Any specific element that needs to appear.'],lpersona:'Persona / Avatar (paste or describe) *',ltopic:'Sequence topic *',lobjs:['Sell / Convert','Engage','Nurture / Educate','Build Authority','Warm Cold Lead','Launch / Event'],lobjd:['CTA to DM, link or offer','Reply, poll, reaction','Value content, tip','Behind scenes, proof, result','Reconnect, resume interest','Promote product, event'],lobjico:['◆','●','◎','✦','◇','★'],lslides:'Number of slides',ltom:'Communication tone *',lcta:'Final CTA (e.g., DM me &quot;I WANT&quot;, click link in bio...)',loffer:'Product or offer (optional)',lextra:'Additional notes (optional)',slides:['5','7','10','12'],slidesLbl:['5 slides','7 slides','10 slides','12 slides'],toms:['Direct and objective','Emotional and empathetic','Didactic and educational','Urgent and provocative','Relaxed and light'],next:'Continue →',back:'← Back',gen_btn:'Generate Stories →',loading:'Creating your stories sequence… may take ~25s',res_title:'Your Sequence',copy:'Copy all',copied:'Copied!',restart:'+ New sequence',e0:'Fill in the persona and topic.',e2:'Select a communication tone.',tsect:'SLIDE TEXT',asect:'ART SUGGESTION',
sys(n,date){return`You are an Instagram Stories expert. Date: ${date}. Create a sequence of ${n} stories in English. Return ONLY a valid JSON array, no text before or after, no markdown, no code blocks. Exact format:\n[{&quot;num&quot;:1,&quot;label&quot;:&quot;Hook&quot;,&quot;text&quot;:&quot;exact slide text (max 3 lines)&quot;,&quot;art&quot;:&quot;detailed visual instruction: background color, image/video, stickers, layout, emojis&quot;},{&quot;num&quot;:2,...},...]\nRules:\n- Slide 1: strong hook that creates curiosity\n- Last slide: clear and direct CTA\n- Short texts, max 3 lines per slide\n- Art must be practical and executable by any creator\n- Natural, non-corporate language\n- Return ONLY the JSON array, nothing else.`}},
es:{ey:['PASO 1 / 4','PASO 2 / 4','PASO 3 / 4','PASO 4 / 4'],h:['Persona y contexto','Objetivo de la secuencia','Cantidad y tono','Detalles finales'],sub:['Pega la persona o describe para quién es esta secuencia.','¿Qué quieres que el seguidor sienta o haga?','¿Cuántos slides y cómo quieres comunicarte?','Algún elemento específico que deba aparecer.'],lpersona:'Persona / Avatar (pega o describe) *',ltopic:'Tema de la secuencia *',lobjs:['Vender / Convertir','Enganchar','Nutrir / Educar','Generar Autoridad','Calentar Lead Frío','Lanzamiento / Evento'],lobjd:['CTA a DM, enlace u oferta','Respuesta, encuesta, reacción','Contenido de valor, consejo','Bastidores, prueba, resultado','Reconexión, retomar interés','Promocionar producto, evento'],lobjico:['◆','●','◎','✦','◇','★'],lslides:'Número de slides',ltom:'Tono de comunicación *',lcta:'CTA final (ej: Escríbeme &quot;QUIERO&quot;, haz clic en el bio...)',loffer:'Producto u oferta (opcional)',lextra:'Notas adicionales (opcional)',slides:['5','7','10','12'],slidesLbl:['5 slides','7 slides','10 slides','12 slides'],toms:['Directo y objetivo','Emocional y empático','Didáctico y educativo','Urgente y provocativo','Relajado y ligero'],next:'Continuar →',back:'← Volver',gen_btn:'Generar Stories →',loading:'Creando tu secuencia de stories… puede tardar ~25s',res_title:'Tu Secuencia',copy:'Copiar todo',copied:'¡Copiado!',restart:'+ Nueva secuencia',e0:'Completa la persona y el tema.',e2:'Selecciona un tono de comunicación.',tsect:'TEXTO DEL SLIDE',asect:'SUGERENCIA DE ARTE',
sys(n,date){return`Eres experto en Instagram Stories. Fecha: ${date}. Crea una secuencia de ${n} stories en español. Retorna SOLO un array JSON válido, sin texto antes o después, sin markdown, sin bloques de código. Formato exacto:\n[{&quot;num&quot;:1,&quot;label&quot;:&quot;Gancho&quot;,&quot;text&quot;:&quot;texto exacto del slide (máx 3 líneas)&quot;,&quot;art&quot;:&quot;instrucción visual detallada: color de fondo, imagen/video, stickers, layout, emojis&quot;},{&quot;num&quot;:2,...},...]\nReglas:\n- Slide 1: gancho fuerte que genere curiosidad\n- Último slide: CTA claro y directo\n- Textos cortos, máximo 3 líneas por slide\n- Arte debe ser práctica y ejecutable por cualquier creador\n- Lenguaje natural, no corporativo\n- Retorna SOLO el array JSON, nada más.`}}
};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v||''}
function setLang(l,btn){lang=l;document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyAll()}
function go(n){document.getElementById('s'+cur).classList.remove('on');cur=n;document.getElementById('s'+n).classList.add('on');updPg();window.scrollTo({top:0,behavior:'smooth'})}
function validate(step){
  const tx=TX[lang];
  if(step===0){
    const p=document.getElementById('f-persona').value.trim();
    const t=document.getElementById('f-topic').value.trim();
    if(!p||!t){if(!p)flash('f-persona');if(!t)flash('f-topic');toast(tx.e0);return}
    go(1);return;
  }
  if(step===2){if(!selTom){toast(tx.e2);return}go(3);return}
}
function flash(id){const el=document.getElementById(id);if(!el)return;el.classList.add('field-err');setTimeout(()=>el.classList.remove('field-err'),2500)}
function updPg(){const pct=Math.round((cur/3)*100);document.getElementById('pgfill').style.width=pct+'%';document.getElementById('pgstep').textContent=TX[lang].ey[cur]||'';document.getElementById('pgpct').textContent=pct+'%'}
function applyAll(){const tx=TX[lang];for(let i=0;i<4;i++){s('ey'+i,tx.ey[i]);s('h'+i,tx.h[i]);s('sb'+i,tx.sub[i])}s('l-persona',tx.lpersona);s('l-topic',tx.ltopic);s('l-slides',tx.lslides);s('l-tom',tx.ltom);s('l-cta',tx.lcta);s('l-offer',tx.loffer);s('l-extra',tx.lextra);buildObjs();buildSlideChips();buildTomChips();for(let i=1;i<=3;i++){s('n'+i,tx.next);s('bk'+i,tx.back)}s('n0',tx.next);s('genbtn',tx.gen_btn);s('loading-txt',tx.loading);s('res-title',tx.res_title);const cb=document.getElementById('copybtn');if(cb)cb.textContent=tx.copy;const rb=document.getElementById('restartbtn');if(rb)rb.textContent=tx.restart;updPg()}
function buildObjs(){const tx=TX[lang];document.getElementById('obj-grid').innerHTML=tx.lobjs.map((o,i)=>`<button class=&quot;obj-card${selObj===o?' on':''}&quot; onclick=&quot;pickObj('${o.replace(/'/g,&quot;\\'&quot;)}',this)&quot;><div class=&quot;obj-ico&quot;>${tx.lobjico[i]}</div><b>${o}</b><span>${tx.lobjd[i]}</span></button>`).join('')}
function pickObj(v,btn){selObj=v;document.querySelectorAll('.obj-card').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}
function buildSlideChips(){const tx=TX[lang];document.getElementById('slides-chips').innerHTML=tx.slidesLbl.map((sl,i)=>`<button class=&quot;chip${selSlides===tx.slides[i]?' on':''}&quot; onclick=&quot;pickSlides('${tx.slides[i]}',this)&quot;>${sl}</button>`).join('')}
function pickSlides(v,btn){selSlides=v;document.querySelectorAll('#slides-chips .chip').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}
function buildTomChips(){const tx=TX[lang];document.getElementById('tom-chips').innerHTML=tx.toms.map(t=>`<button class=&quot;chip${selTom===t?' on':''}&quot; onclick=&quot;pickTom('${t.replace(/'/g,&quot;\\'&quot;).replace(/\//g,&quot;\\/&quot;)}',this)&quot;>${t}</button>`).join('')}
function pickTom(v,btn){selTom=v;document.querySelectorAll('#tom-chips .chip').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}
function nowDate(){return new Date().toLocaleDateString(lang==='pt'?'pt-BR':lang==='es'?'es-ES':'en-US',{day:'2-digit',month:'long',year:'numeric'})}

function safeParseJSON(raw){
  // Try direct parse
  try{return JSON.parse(raw.trim())}catch(e){}
  // Extract JSON array from response
  const m=raw.match(/\[[\s\S]*\]/);
  if(m){try{return JSON.parse(m[0])}catch(e){}}
  // Fallback: wrap entire response as single slide
  return [{num:1,label:'Sequência',text:raw.substring(0,500),art:'Consulte o texto completo acima.'}];
}

function renderSlides(slides){
  const tx=TX[lang];
  document.getElementById('slides-wrap').innerHTML=slides.map(sl=>`
    <div class=&quot;slide-card&quot;>
      <div class=&quot;slide-hdr&quot;>
        <div class=&quot;slide-num&quot;>${sl.num}</div>
        <span class=&quot;slide-lbl&quot;>${sl.label||'Slide '+sl.num}</span>
      </div>
      <div class=&quot;slide-body&quot;>
        <div class=&quot;slide-txt&quot;><span class=&quot;sect-lbl&quot;>${tx.tsect}</span><div class=&quot;slide-content&quot;>${sl.text||'—'}</div></div>
        <div class=&quot;slide-art&quot;><span class=&quot;sect-lbl&quot;>${tx.asect}</span><div class=&quot;slide-art-content&quot;>${sl.art||'—'}</div></div>
      </div>
    </div>`).join('')
}

async function generateStories(){
  const persona=document.getElementById('f-persona').value;
  const topic=document.getElementById('f-topic').value;
  const cta=document.getElementById('f-cta').value;
  const offer=document.getElementById('f-offer').value;
  const extra=document.getElementById('f-extra').value;
  const btn=document.getElementById('genbtn');btn.disabled=true;
  document.getElementById('steps').style.display='none';
  document.getElementById('result').classList.add('on');
  document.getElementById('spin-wrap').style.display='flex';
  document.getElementById('slides-wrap').innerHTML='';
  document.getElementById('res-acts').style.display='none';
  const msg=`PERSONA: ${persona}\nASSUNTO: ${topic}\nOBJETIVO: ${selObj||'Geral'}\nNÚMERO DE SLIDES: ${selSlides}\nTOM: ${selTom}\nCTA FINAL: ${cta||'À escolha da IA'}\nPRODUTO/OFERTA: ${offer||'Não especificado'}\nOBSERVAÇÕES: ${extra||'Nenhuma'}`;
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,system:TX[lang].sys(selSlides,nowDate()),messages:[{role:'user',content:msg}]})});
    const d=await r.json();
    const raw=d.content?.map(b=>b.text||'').join('')||'[]';
    parsedSlides=safeParseJSON(raw);
    document.getElementById('spin-wrap').style.display='none';
    renderSlides(parsedSlides);
    document.getElementById('res-acts').style.display='flex';
  }catch(e){
    document.getElementById('spin-wrap').style.display='none';
    document.getElementById('slides-wrap').innerHTML='<p style=&quot;padding:2rem 0;font-size:14px;color:var(--tx2)&quot;>Erro de conexão. Tente novamente.</p>';
    document.getElementById('res-acts').style.display='flex';
    btn.disabled=false;
  }
}

function copyAll(){
  const out=parsedSlides.map(sl=>`SLIDE ${sl.num} — ${sl.label||''}\nTexto: ${sl.text||''}\nArte: ${sl.art||''}`).join('\n\n');
  navigator.clipboard.writeText(out||'').then(()=>{const btn=document.getElementById('copybtn');btn.textContent=TX[lang].copied;setTimeout(()=>btn.textContent=TX[lang].copy,2000)});
}

function restart(){
  cur=0;selObj='';selTom='';parsedSlides=[];selSlides='7';
  document.getElementById('steps').style.display='block';
  document.getElementById('result').classList.remove('on');
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('on'));
  document.getElementById('s0').classList.add('on');
  document.getElementById('genbtn').disabled=false;
  ['f-persona','f-topic','f-cta','f-offer','f-extra'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  applyAll();window.scrollTo({top:0,behavior:'smooth'});
}
applyAll();
</script>
</body>

function show(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('panel-' + name).classList.add('on');
  btn.classList.add('on');
}
</script>
